services:
  api:
    image: ghcr.io/deadlock-api/deadlock-api:latest
    build: .
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./model:/app/model:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/v1/info/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
