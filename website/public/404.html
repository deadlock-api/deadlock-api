<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Page Not Found · Deadlock API</title>
    <link rel="icon" type="image/ico" href="/favicon.ico" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(80% 60% at 50% 0%, rgba(250, 68, 84, 0.15), transparent), #0a0a0d;
        color: #f0f0f3;
        font-family:
          "Inter Variable",
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: clamp(3rem, 12vw, 6rem);
        margin: 0;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #fa4454;
      }
      p {
        color: rgba(240, 240, 243, 0.6);
        font-size: 1rem;
        margin: 1rem 0 2rem;
      }
      a {
        display: inline-block;
        padding: 0.6rem 1.4rem;
        border-radius: 0.5rem;
        background: #fa4454;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        transition: background-color 120ms ease;
      }
      a:hover {
        background: #d63a48;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>That page doesn’t exist on Deadlock API.</p>
      <a href="/">Back to home</a>

</html>
