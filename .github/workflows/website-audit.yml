name: Website Security Audit

on:
  push:
    paths:
      - 'website/**/pnpm-lock.yaml'
      - 'website/**/package.json'
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      level:
        description: "The level of vulnerability to report (low, moderate, high, critical)"
        required: false
        default: high
        type: choice
        options:
          - low
          - moderate
          - high
          - critical

jobs:
  audit:
    name: PNPM Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install

      - name: Run pnpm audit
        run: pnpm audit --audit-level ${{ inputs.level || 'high' }} --json > pnpm-audit-report.json

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pnpm-audit-report
          path: website/pnpm-audit-report.json
