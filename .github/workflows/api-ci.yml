name: API CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag to push (e.g., v1.0.0, specific-feature)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add rustfmt
      - name: Rustfmt Check
        run: cargo fmt --all -- --check

  deps:
    name: Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-machete
      - name: Machete
        run: cargo machete

  typos:
    name: Typos
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: typos-cli
      - name: Typos Check
        run: typos src/

  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: api
    steps:
      - uses: useblacksmith/checkout@v1
      - uses: useblacksmith/stickydisk@v1
        with:
          key: deadlock-api-cargo-registry
          path: ~/.cargo/registry
      - uses: useblacksmith/stickydisk@v1
        with:
          key: deadlock-api-cargo-git
          path: ~/.cargo/git
      - uses: useblacksmith/stickydisk@v1
        with:
          key: deadlock-api-cargo-target
          path: api/target
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev clang mold
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "api-build-cache-${{ runner.os }}-${{ runner.arch }}"
          workspaces: "api -> target"
      - run: rustup component add clippy
      - name: Cargo Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  unit_test:
    name: Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: api
    steps:
      - uses: useblacksmith/checkout@v1
      - uses: useblacksmith/stickydisk@v1
        with:
          key: deadlock-api-cargo-registry
          path: ~/.cargo/registry
      - uses: useblacksmith/stickydisk@v1
        with:
          key: deadlock-api-cargo-git
          path: ~/.cargo/git
      - uses: useblacksmith/stickydisk@v1
        with:
          key: deadlock-api-cargo-target
          path: api/target
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev clang mold
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "api-build-cache-${{ runner.os }}-${{ runner.arch }}"
          workspaces: "api -> target"
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-nextest
      - name: Unit Tests
        run: cargo nextest run --locked --lib --status-level fail

  build_and_test:
    name: Build and Integration Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: api
    steps:
      - name: Determine Docker Tag
        working-directory: .
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DOCKER_TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            DOCKER_TAG="latest"
          else
            DOCKER_TAG="${{ github.sha }}"
          fi
          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV

      ###############################
      ##           Setup           ##
      ###############################
      - uses: useblacksmith/checkout@v1
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Builder
        uses: useblacksmith/setup-docker-builder@v1
      - uses: useblacksmith/stickydisk@v1
        with:
          key: deadlock-api-cargo-registry
          path: ~/.cargo/registry
      - uses: useblacksmith/stickydisk@v1
        with:
          key: deadlock-api-cargo-git
          path: ~/.cargo/git
      - uses: useblacksmith/stickydisk@v1
        with:
          key: deadlock-api-cargo-target
          path: api/target
      - name: Setup go-task
        run: if [ ! -f "$HOME/.local/bin/task" ]; then curl -sSf https://taskfile.dev/install.sh | sh -s -- -b ~/.local/bin; fi
      - name: Start API Dependency Docker Images (in Background)
        run: nohup task start-test-env-api-deps > pull.log 2>&1 &
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev clang mold
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "api-build-cache-${{ runner.os }}-${{ runner.arch }}"
          workspaces: "api -> target"
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-nextest

      ###############################
      ##           Build           ##
      ###############################
      - name: Build Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: api
          tags: ${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
          load: true
          push: false

      ###############################
      ##    Integration Tests      ##
      ###############################
      - name: Create .env.testing from example
        run: cp .env.testing.example .env.testing
      - name: Integration Tests
        run: NO_BUILD=1 IMAGE=${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }} task test

  deploy:
    name: Deploy
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [fmt, deps, typos, lint, unit_test, build_and_test]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    steps:
      - name: Determine Docker Tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DOCKER_TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            DOCKER_TAG="latest"
          fi
          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV
      - uses: useblacksmith/checkout@v1
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Builder
        uses: useblacksmith/setup-docker-builder@v1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: api
          tags: ${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
          push: true
