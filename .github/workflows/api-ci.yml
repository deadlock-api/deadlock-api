name: API CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag to push (e.g., v1.0.0, specific-feature)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  ###############################
  ##    Stage 1: Lint & Check  ##
  ###############################

  checks:
    uses: ./.github/workflows/rust-ci-checks.yml
    with:
      working-directory: api
      lint-runs-on: blacksmith-4vcpu-ubuntu-2404
      lint-extra-apt-packages: clang mold
      lint-install-rust-toolchain: true
      rust-cache-shared-key: api-build-cache

  ###############################
  ##     Stage 2: Test         ##
  ###############################

  test:
    name: Test
    needs: [checks]
    timeout-minutes: 20
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: api
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev clang mold
      - name: Install ONNX Runtime
        run: |
          ORT_VERSION=1.25.0
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            | sudo tar -xz -C /opt
          echo "ORT_DYLIB_PATH=/opt/onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so.${ORT_VERSION}" >> $GITHUB_ENV
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "api-build-cache-${{ runner.os }}-${{ runner.arch }}"
          workspaces: "api -> target"
      - name: Tests
        run: cargo test --locked

  ###############################
  ##     Stage 3: Deploy       ##
  ###############################

  deploy:
    name: Deploy
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [test]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    defaults:
      run:
        working-directory: api
    steps:
      - name: Determine Docker Tag
        working-directory: .
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DOCKER_TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            DOCKER_TAG="latest"
          fi
          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Docker Builder
        uses: useblacksmith/setup-docker-builder@v1
      - name: Build and push Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: api
          tags: ${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
          push: true
