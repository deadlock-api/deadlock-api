name: API CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag to push (e.g., v1.0.0, specific-feature)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  ###############################
  ##    Stage 1: Build & Lint  ##
  ###############################

  fmt:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add rustfmt
      - name: Rustfmt Check
        run: cargo fmt --all -- --check

  deps:
    name: Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-machete
      - name: Machete
        run: cargo machete

  typos:
    name: Typos
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: typos-cli
      - name: Typos Check
        run: typos src/

  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: api
    steps:
      - uses: useblacksmith/checkout@v1
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev clang mold
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "api-build-cache-${{ runner.os }}-${{ runner.arch }}"
          workspaces: "api -> target"
      - run: rustup component add clippy
      - name: Cargo Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  build:
    name: Build Docker Image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: api
    steps:
      - name: Determine Docker Tag
        working-directory: .
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DOCKER_TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            DOCKER_TAG="latest"
          else
            DOCKER_TAG="${{ github.sha }}"
          fi
          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV
      - uses: useblacksmith/checkout@v1
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Builder
        uses: useblacksmith/setup-docker-builder@v1
      - name: Build Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: api
          tags: ${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
          load: true
          push: false
      - name: Save Docker image
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }} | zstd -T0 -3 > /tmp/image.tar.zst
        working-directory: .
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar.zst
          retention-days: 1

  ###############################
  ##     Stage 2: Test         ##
  ###############################

  unit_test:
    name: Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: api
    steps:
      - uses: useblacksmith/checkout@v1
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev clang mold
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "api-build-cache-${{ runner.os }}-${{ runner.arch }}"
          workspaces: "api -> target"
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-nextest
      - name: Unit Tests
        run: cargo nextest run --locked --lib --status-level fail

  integration_test:
    name: Integration Tests
    needs: [build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: api
    steps:
      - uses: useblacksmith/checkout@v1
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev clang mold
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "api-build-cache-${{ runner.os }}-${{ runner.arch }}"
          workspaces: "api -> target"
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-nextest
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Load Docker image
        run: zstd -d /tmp/image.tar.zst --stdout | docker load
        working-directory: .
      - name: Setup go-task
        run: if [ ! -f "$HOME/.local/bin/task" ]; then curl -sSf https://taskfile.dev/install.sh | sh -s -- -b ~/.local/bin; fi
      - name: Create .env.testing from example
        run: cp .env.testing.example .env.testing
      - name: Integration Tests
        run: NO_BUILD=1 IMAGE=${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }} task test
    env:
      DOCKER_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || (github.ref == 'refs/heads/master' && 'latest' || github.sha) }}

  ###############################
  ##     Stage 3: Deploy       ##
  ###############################

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [unit_test, integration_test]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    steps:
      - name: Determine Docker Tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DOCKER_TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            DOCKER_TAG="latest"
          fi
          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Load Docker image
        run: zstd -d /tmp/image.tar.zst --stdout | docker load
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Docker image
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
