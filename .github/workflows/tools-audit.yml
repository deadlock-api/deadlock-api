name: Tools Audit

on:
  push:
    paths:
      - 'tools/**/Cargo.toml'
      - 'tools/**/Cargo.lock'
  pull_request:
    paths:
      - 'tools/**/Cargo.toml'
      - 'tools/**/Cargo.lock'
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  issues: write
  checks: write

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools
    steps:
      - uses: actions/checkout@v6
      - id: install
        run: |
          rustup override set stable
          rustup update stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        run: cargo audit
