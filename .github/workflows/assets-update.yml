name: Assets Update

# Rebuilds all game assets from Steam and uploads them to R2 once a day.
# See scripts/build_version_and_upload.sh for the full pipeline.

on:
  schedule:
    # 05:00 UTC daily.
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run the full build even if the client version is unchanged'
        type: boolean
        default: false
      rebuild_icons_index:
        description: 'Rebuild the icons index from scratch (drop legacy flat entries)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  # Never let two asset builds clobber each other's R2 uploads.
  group: assets-update
  cancel-in-progress: false

jobs:
  # Cheap gate: only do the heavy build when Steam's active client version
  # differs from the latest version we've already published to R2. The latest
  # built version is read from the PUBLIC steam-info index, so this needs no
  # secrets and exits in seconds when there's nothing new.
  check:
    name: Check for new client version
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
      version: ${{ steps.compare.outputs.version }}
    steps:
      - name: Compare Steam active version against published version
        id: compare
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          active=$(curl -fsSL "https://api.steampowered.com/IGCVersion_1422450/GetClientVersion/v1/" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["result"]["active_version"])')
          # Latest published build = newest entry of the all-steam-infos index
          # (sorted newest-first). Missing/empty (first ever run) -> 0.
          raw=$(curl -fsS "https://assets-bucket.deadlock-api.com/assets-api-res/steam-info/all.json.zst" 2>/dev/null | zstd -dq 2>/dev/null || true)
          if [ -n "$raw" ]; then
            latest=$(printf '%s' "$raw" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["client_version"] if d else 0)' 2>/dev/null || echo 0)
          else
            latest=0
          fi
          echo "Steam active_version=$active, latest published=$latest"
          echo "version=$active" >> "$GITHUB_OUTPUT"
          if [ "$active" != "$latest" ]; then
            echo "New client version detected -> running full build."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new client version -> skipping full build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  update-assets:
    name: Build & upload assets
    needs: check
    # Run on a new client version, when manually forced, or when an icons-index
    # rebuild was requested.
    if: needs.check.outputs.changed == 'true' || inputs.force || inputs.rebuild_icons_index
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 180
    # contents:write so the release-notes step can publish a GitHub release.
    permissions:
      contents: write
    env:
      # R2 bucket + rclone "R2" remote, shared by the build and release steps.
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_REGION: auto
      RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: useblacksmith/checkout@v1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget unzip zstd rsync ffmpeg imagemagick python3
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Cache Steam depot + tooling
        uses: useblacksmith/cache@v5
        with:
          path: |
            .assets-build/DepotDownloader
            .assets-build/Source2Viewer-CLI
            .assets-build/depot
            .assets-build/.video-hashes
          key: assets-depot-${{ needs.check.outputs.version }}
          restore-keys: |
            assets-depot-

      - name: Build and upload assets to R2
        run: bash scripts/build_version_and_upload.sh
        env:
          # Steam login for the depot download (see reminder when adding secrets).
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          # When set, rebuild the icons index from scratch instead of incrementally.
          REBUILD_ICONS_INDEX: ${{ inputs.rebuild_icons_index && '1' || '' }}

      # Secondary to the upload: diff the new build against the previous one and
      # publish a GitHub release. Never fail the run if note generation hiccups.
      - name: Publish release notes
        continue-on-error: true
        run: bash scripts/generate_release_notes.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
