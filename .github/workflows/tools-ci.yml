name: Tools CI/CD

env:
  CARGO_TERM_COLOR: always

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'tools/**'
      - '.github/workflows/tools-ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'tools/**'
      - '.github/workflows/tools-ci.yml'

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools
    steps:
      - uses: actions/checkout@v6
      - name: Update Rust toolchain
        run: |
          rustup override set stable
          rustup update stable
          rustup component add rustfmt
      - name: Rustfmt Check
        uses: actions-rust-lang/rustfmt@v1
        with:
          manifest-path: tools/Cargo.toml

  deps:
    name: Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools
    steps:
      - uses: actions/checkout@v6
      - name: Update Rust toolchain to stable
        run: |
          rustup override set stable
          rustup update stable
      - name: Machete
        uses: bnjbvr/cargo-machete@b81ce1560c5fbd0210cb66d88bf210329ff04266
        with:
          manifest-path: tools/Cargo.toml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools
    steps:
      - uses: actions/checkout@v6
      - name: Install Protocol Buffers compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev clang mold
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "tools-build-cache-${{ runner.os }}-${{ runner.arch }}"
          workspaces: "tools -> target"
      - name: Update Rust toolchain
        run: |
          rustup override set stable
          rustup update stable
          rustup component add clippy
      - name: Cargo Clippy
        run: cargo clippy --all-targets --locked --all-features -- -D warnings

  build-base:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v6
      - name: Setup Docker Builder
        uses: useblacksmith/setup-docker-builder@v1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Base Image
        id: build-base
        uses: useblacksmith/build-push-action@v2
        with:
          context: tools
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/tools-base:latest

  push-components:
    runs-on: ubuntu-24.04
    needs: build-base
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    strategy:
      matrix:
        component:
          - salt-scraper
          - hltv-scraper
          - ingest-worker
          - matchdata-downloader
          - active-matches-scraper
          - builds-fetcher
          - history-fetcher
          - steam-profile-fetcher
          - update-assets-tables
    steps:
      - uses: actions/checkout@v6
      - name: Filter changed paths
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            change: [ 'tools/${{ matrix.component }}/**', 'tools/common/**', 'tools/Cargo.toml', 'tools/Cargo.lock', 'tools/Dockerfile' ]
      - name: Check if component should build
        id: should_deploy
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ steps.changes.outputs['change'] }}" == "true" ]]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up Docker
        if: steps.should_deploy.outputs.deploy == 'true'
        uses: docker/setup-docker-action@v5
      - name: Login to GitHub Container Registry
        if: steps.should_deploy.outputs.deploy == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Component
        if: steps.should_deploy.outputs.deploy == 'true'
        run: |
          docker pull ghcr.io/${{ github.repository }}/tools-base:latest
          docker tag ghcr.io/${{ github.repository }}/tools-base:latest ghcr.io/${{ github.repository }}/${{ matrix.component }}:latest
          docker push ghcr.io/${{ github.repository }}/${{ matrix.component }}:latest
