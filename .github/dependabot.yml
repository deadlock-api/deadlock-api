version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      all-actions:
        patterns:
          - "*"
    rebase-strategy: auto

  - package-ecosystem: cargo
    directory: /api
    schedule:
      interval: daily
    rebase-strategy: auto
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: daily
    groups:
      all-docker:
        patterns:
          - "*"
    rebase-strategy: auto

  - package-ecosystem: cargo
    directory: /tools
    schedule:
      interval: daily
    rebase-strategy: auto
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

  - package-ecosystem: docker
    directory: /tools
    schedule:
      interval: daily
    groups:
      all-docker:
        patterns:
          - "*"
    rebase-strategy: auto

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: daily
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
