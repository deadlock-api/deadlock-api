version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      all-actions:
        patterns:
          - "*"
    rebase-strategy: auto

  - package-ecosystem: cargo
    directory: /api
    schedule:
      interval: daily
    rebase-strategy: auto
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    ignore:
      # 0.24.4 and 0.24.5 broke counter aggregation (stuck at 1).
      - dependency-name: "metrics"
        versions: ["0.24.4", "0.24.5"]

  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: daily
    groups:
      all-docker:
        patterns:
          - "*"
    rebase-strategy: auto

  - package-ecosystem: cargo
    directory: /tools
    schedule:
      interval: daily
    rebase-strategy: auto
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    ignore:
      # 0.24.4 and 0.24.5 broke counter aggregation (stuck at 1).
      - dependency-name: "metrics"
        versions: ["0.24.4", "0.24.5"]

  - package-ecosystem: docker
    directory: /tools
    schedule:
      interval: daily
    groups:
      all-docker:
        patterns:
          - "*"
    rebase-strategy: auto

  - package-ecosystem: cargo
    directory: /live-events
    schedule:
      interval: daily
    rebase-strategy: auto
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    ignore:
      # 0.24.4 and 0.24.5 broke counter aggregation (stuck at 1).
      - dependency-name: "metrics"
        versions: ["0.24.4", "0.24.5"]

  - package-ecosystem: docker
    directory: /live-events
    schedule:
      interval: daily
    groups:
      all-docker:
        patterns:
          - "*"
    rebase-strategy: auto

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: daily
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
