[tools]
pnpm = "10.18.0"
rust = "1.96"
java = "temurin-21"
uv = "latest"
lefthook = "latest"
"cargo:typos-cli" = "latest"
"cargo:cargo-machete" = "latest"

[tasks.setup]
description = "Install dev tools and git hooks"
run = [
  "rustup component add rustfmt clippy",
  "cd website && pnpm install",
  "lefthook install",
]

[tasks.update-assets]
description = "Rebuild all game assets from Steam and upload them to R2 (incl. index rebuild)"
run = [
  "bash scripts/build_version_and_upload.sh"
]
