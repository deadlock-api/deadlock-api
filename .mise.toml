[tools]
pnpm = "10.18.0"
rust = "1.95"
lefthook = "latest"
"cargo:typos-cli" = "latest"
"cargo:cargo-machete" = "latest"

[tasks.setup]
description = "Install dev tools and git hooks"
run = [
  "rustup component add rustfmt clippy",
  "cd website && pnpm install",
  "lefthook install",
]

[tasks.update-assets]
description = "Update generated assets"
run = [
  "bash scripts/update_r2_index.sh"
]
